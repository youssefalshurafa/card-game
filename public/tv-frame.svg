<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Antennas -->
  <line x1="200" y1="30" x2="155" y2="0" stroke="#6b6b6b" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="30" x2="245" y2="0" stroke="#6b6b6b" stroke-width="4" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="155" cy="0" r="3" fill="#888"/>
  <circle cx="245" cy="0" r="3" fill="#888"/>

  <!-- TV body shadow -->
  <rect x="28" y="32" width="344" height="286" rx="24" fill="#555" opacity="0.2"/>
  <!-- TV body outer -->
  <rect x="24" y="28" width="344" height="286" rx="24" fill="url(#tvBody)"/>
  <!-- TV body inner border -->
  <rect x="28" y="32" width="336" height="278" rx="22" fill="none" stroke="#8b6914" stroke-width="1" opacity="0.3"/>

  <!-- Screen bezel (orange/brown) -->
  <rect x="38" y="42" width="268" height="220" rx="12" fill="url(#bezel)"/>
  <!-- Screen inner (black) -->
  <rect x="46" y="50" width="252" height="204" rx="8" fill="#111"/>

  <!-- Knobs panel area -->
  <rect x="320" y="60" width="36" height="200" rx="6" fill="url(#knobPanel)" opacity="0.5"/>

  <!-- Knob 1 -->
  <circle cx="338" cy="110" r="14" fill="url(#knob1)"/>
  <circle cx="338" cy="110" r="10" fill="#444" stroke="#333" stroke-width="1"/>
  <circle cx="338" cy="110" r="5" fill="#555"/>

  <!-- Knob 2 -->
  <circle cx="338" cy="160" r="14" fill="url(#knob2)"/>
  <circle cx="338" cy="160" r="10" fill="#444" stroke="#333" stroke-width="1"/>
  <circle cx="338" cy="160" r="5" fill="#555"/>

  <!-- Small knob -->
  <circle cx="338" cy="205" r="8" fill="#444" stroke="#333" stroke-width="1"/>
  <circle cx="338" cy="205" r="4" fill="#555"/>

  <!-- TV feet -->
  <rect x="70" y="308" width="40" height="8" rx="4" fill="#8b6914" opacity="0.6"/>
  <rect x="280" y="308" width="40" height="8" rx="4" fill="#8b6914" opacity="0.6"/>

  <defs>
    <linearGradient id="tvBody" x1="196" y1="28" x2="196" y2="314" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b8b8b8"/>
      <stop offset="0.3" stop-color="#a0a0a0"/>
      <stop offset="0.7" stop-color="#909090"/>
      <stop offset="1" stop-color="#808080"/>
    </linearGradient>
    <linearGradient id="bezel" x1="172" y1="42" x2="172" y2="262" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4841a"/>
      <stop offset="0.5" stop-color="#c06a10"/>
      <stop offset="1" stop-color="#a85a0a"/>
    </linearGradient>
    <linearGradient id="knobPanel" x1="338" y1="60" x2="338" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#999"/>
      <stop offset="1" stop-color="#777"/>
    </linearGradient>
    <radialGradient id="knob1" cx="338" cy="108" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#666"/>
      <stop offset="1" stop-color="#333"/>
    </radialGradient>
    <radialGradient id="knob2" cx="338" cy="158" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#666"/>
      <stop offset="1" stop-color="#333"/>
    </radialGradient>
  </defs>
</svg>
